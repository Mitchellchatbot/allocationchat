<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Widget</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #fafafa;
        color: #222;
      }
      .nav {
        height: 64px;
        border-bottom: 1px solid #eee;
        background: #fff;
        display: flex;
        align-items: center;
        padding: 0 32px;
        gap: 32px;
      }
      .nav-brand { font-weight: 700; font-size: 18px; color: #1ab49c; }
      .nav-links { display: flex; gap: 24px; color: #666; font-size: 14px; }
      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 80px 24px 120px;
      }
      h1 {
        font-size: 48px;
        line-height: 1.1;
        margin: 0 0 16px;
        letter-spacing: -0.02em;
      }
      .lede { font-size: 18px; color: #555; max-width: 600px; line-height: 1.5; }
      .placeholders {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-top: 56px;
      }
      .card {
        background: #fff;
        border: 1px solid #eee;
        border-radius: 12px;
        padding: 20px;
        height: 160px;
      }
      .card h3 { margin: 0 0 8px; font-size: 15px; }
      .card p { margin: 0; color: #888; font-size: 13px; line-height: 1.5; }
      .hint {
        position: fixed;
        left: 24px;
        bottom: 24px;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 12px;
        color: #666;
        box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        max-width: 280px;
      }
      .hint strong { color: #1ab49c; }
      .config-form {
        max-width: 520px;
        margin: 120px auto;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 16px;
        padding: 32px;
        text-align: center;
      }
      .config-form h2 { margin: 0 0 8px; }
      .config-form p { color: #666; font-size: 14px; margin: 0 0 24px; }
      .config-form input {
        width: 100%;
        padding: 12px 16px;
        font-size: 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
        outline: none;
      }
      .config-form input:focus { border-color: #1ab49c; }
      .config-form button {
        margin-top: 16px;
        width: 100%;
        padding: 12px 16px;
        background: #1ab49c;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      .config-form code {
        display: block;
        background: #f5f5f5;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
        margin-top: 12px;
        word-break: break-all;
      }
      iframe.widget-frame {
        position: fixed;
        inset: 0;
        border: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background: transparent;
        z-index: 2147483647;
      }
      iframe.widget-frame { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="content"></div>

    <script>
      // Read propertyId from ?property= query string (or ?propertyId=)
      const params = new URLSearchParams(window.location.search);
      const propertyId = params.get('property') || params.get('propertyId');

      const content = document.getElementById('content');

      if (!propertyId) {
        content.innerHTML = `
          <div class="config-form">
            <h2>Test your widget</h2>
            <p>Enter your property ID to load the widget on this fake site.</p>
            <input id="pid" placeholder="paste property ID" autofocus />
            <button onclick="go()">Load widget</button>
            <p style="margin-top:24px;font-size:12px;">
              Find your property ID in the dashboard URL after clicking a property,<br/>
              or in Supabase Studio → <code>properties</code> table.
            </p>
          </div>
        `;
        window.go = function () {
          const pid = document.getElementById('pid').value.trim();
          if (pid) window.location.search = '?property=' + pid;
        };
        document.getElementById('pid').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') window.go();
        });
      } else {
        content.innerHTML = `
          <nav class="nav">
            <div class="nav-brand">Acme Health Clinic</div>
            <div class="nav-links">
              <span>Services</span>
              <span>About</span>
              <span>Contact</span>
            </div>
          </nav>
          <main>
            <h1>Welcome to Acme Health Clinic</h1>
            <p class="lede">This is a blank test page. The chat widget is embedded in the bottom-right corner — click it and have a conversation to test extraction, notifications, and any other widget behavior.</p>
            <div class="placeholders">
              <div class="card"><h3>Placeholder card</h3><p>Ignore me. I exist so the page has something on it.</p></div>
              <div class="card"><h3>Placeholder card</h3><p>Ignore me. I exist so the page has something on it.</p></div>
              <div class="card"><h3>Placeholder card</h3><p>Ignore me. I exist so the page has something on it.</p></div>
            </div>
          </main>
          <div class="hint">
            <strong>Testing property:</strong><br/>
            <code style="font-size:11px;background:#f5f5f5;padding:2px 6px;border-radius:4px;">${propertyId}</code>
          </div>
          <iframe
            class="widget-frame"
            src="/widget-embed/${propertyId}?autoOpen=false"
            title="Chat widget"
            allow="clipboard-write"
          ></iframe>
        `;
      }
    </script>
  </body>
</html>
